<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0e1a">
    <title>LATOTO · Dashboard CS</title>

    <!-- Favicon -->
    <link rel="icon" href="https://socket-latoto.hokibgs.com/uploads/latoto/avatars/displayPicture-1781777527776-390432475.png" type="image/png">

    <!-- Preconnect for Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        /* ========================================
           CORE VARIABLES – NEON GOLD
           ======================================== */
        :root {
            --sidebar-width: 280px;
            --header-height: 70px;

            --bg-body: #080c18;
            --bg-sidebar: #0a0f1e;
            --bg-card: #0e1528;
            --bg-glass: rgba(255, 215, 0, 0.03);
            --bg-hover: rgba(255, 215, 0, 0.06);

            --text-main: #f0ead8;
            --text-muted: #8899b0;

            --gold: #f5c842;
            --gold-dark: #c9a227;
            --gold-glow: rgba(245, 200, 66, 0.25);
            --gold-gradient: linear-gradient(135deg, #b8860b, #ffd700 45%, #f5c842 70%, #b8860b);
            
            --border: rgba(255, 215, 0, 0.08);
            --border-active: rgba(245, 200, 66, 0.35);
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 8px;

            --shadow-sm: 0 4px 20px rgba(0, 0, 0, 0.6);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.7);
            --shadow-gold: 0 0 30px rgba(245, 200, 66, 0.08);

            --font-main: 'Plus Jakarta Sans', sans-serif;
            --font-display: 'Cinzel', serif;
            --font-tech: 'Space Grotesk', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        /* Reset & Base */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        
        body {
            font-family: var(--font-main);
            background: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            position: relative;
        }

        /* Background Image dengan Overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url('https://i.pinimg.com/1200x/16/d2/42/16d242fbe0978368191ac1f1461ce884.jpg') center/cover no-repeat fixed;
            opacity: 0.15;
            z-index: -1;
            pointer-events: none;
        }

        a { text-decoration: none; color: inherit; }
        button { border: none; background: none; cursor: pointer; color: inherit; font-family: inherit; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 215, 0, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--gold); }

        /* ========================================
           AMBIENT GLOW
           ======================================== */
        .ambient-glow {
            position: fixed;
            width: 700px;
            height: 700px;
            border-radius: 50%;
            filter: blur(130px);
            opacity: 0.06;
            z-index: -1;
            pointer-events: none;
        }
        .glow-1 { top: -250px; right: -150px; background: radial-gradient(circle, var(--gold), transparent); }
        .glow-2 { bottom: -250px; left: -150px; background: radial-gradient(circle, #f5c842, transparent); }

        /* ========================================
           SIDEBAR
           ======================================== */
        .sidebar {
            width: var(--sidebar-width);
            height: 100%;
            background: var(--bg-sidebar);
            backdrop-filter: blur(12px);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 50;
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(180deg, transparent, var(--gold), transparent);
            opacity: 0.15;
        }

        /* Brand */
        .brand-section {
            padding: 28px 20px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .brand-logo img {
            height: 52px;
            width: auto;
            margin-bottom: 14px;
            filter: drop-shadow(0 0 20px var(--gold-glow));
            transition: filter 0.4s;
        }

        .brand-logo img:hover {
            filter: drop-shadow(0 0 35px var(--gold-glow));
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 18px;
            border-radius: 50px;
            background: rgba(245, 200, 66, 0.07);
            border: 1px solid rgba(245, 200, 66, 0.12);
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1.8px;
            font-family: var(--font-display);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--gold);
            border-radius: 50%;
            box-shadow: 0 0 14px var(--gold);
            animation: pulse-dot 2s infinite;
        }

        /* Menu */
        .menu-scroll-area {
            flex: 1;
            overflow-y: auto;
            padding: 22px 12px 30px;
        }

        .menu-group-label {
            font-size: 0.55rem;
            font-family: var(--font-display);
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2.5px;
            margin: 20px 0 10px 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-group-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--border), transparent);
        }

        .nav-item {
            display: flex;
            align-items: center;
            width: 100%;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            color: var(--text-muted);
            transition: all 0.25s ease;
            margin-bottom: 3px;
            position: relative;
            text-align: left;
            border: 1px solid transparent;
        }

        .nav-item:hover {
            background: var(--bg-hover);
            color: var(--text-main);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: rgba(245, 200, 66, 0.07);
            color: var(--gold);
            border-color: rgba(245, 200, 66, 0.12);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.3), inset 0 0 30px rgba(245, 200, 66, 0.02);
        }

        .nav-item.active .nav-icon {
            background: var(--gold-gradient);
            color: #0a0e1a;
            box-shadow: 0 4px 20px var(--gold-glow);
            transform: scale(1.05);
        }

        .nav-icon {
            width: 38px;
            height: 38px;
            min-width: 38px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 14px;
            background: rgba(255, 255, 255, 0.02);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .nav-text {
            display: flex;
            flex-direction: column;
        }
        .nav-title {
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }
        .nav-desc {
            font-size: 0.62rem;
            opacity: 0.5;
            margin-top: 1px;
        }

        /* ========================================
           MAIN CONTENT
           ======================================== */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            padding: 20px;
            gap: 20px;
            position: relative;
        }

        /* Header */
        .top-header {
            height: var(--header-height);
            background: rgba(10, 15, 30, 0.7);
            backdrop-filter: blur(24px);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: var(--shadow-sm), var(--shadow-gold);
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .page-icon-box {
            width: 44px;
            height: 44px;
            background: var(--gold-gradient);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0a0e1a;
            font-size: 1.2rem;
            box-shadow: 0 4px 25px var(--gold-glow);
        }

        .page-title h1 {
            font-family: var(--font-tech);
            font-size: 1.15rem;
            font-weight: 700;
            letter-spacing: 0.5px;
        }
        .page-title p {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .clock-widget {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 50px;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--gold);
            box-shadow: inset 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        /* Iframe */
        .content-frame-wrapper {
            flex: 1;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            position: relative;
            box-shadow: var(--shadow-xl), var(--shadow-gold);
            backdrop-filter: blur(4px);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--bg-body);
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        iframe.loaded {
            opacity: 1;
        }

        /* Loader */
        .loader-overlay {
            position: absolute;
            inset: 0;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
            transition: opacity 0.35s ease, visibility 0.35s ease;
        }

        .loader-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid rgba(255, 215, 0, 0.06);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-text {
            margin-top: 18px;
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            letter-spacing: 2.5px;
            text-transform: uppercase;
        }

        /* Mobile */
        .mobile-header {
            display: none;
            padding: 14px 20px;
            background: var(--bg-sidebar);
            border-bottom: 1px solid var(--border);
            align-items: center;
            justify-content: space-between;
        }
        .mobile-brand img {
            height: 32px;
            filter: drop-shadow(0 0 14px var(--gold-glow));
        }
        .mobile-menu-btn {
            color: var(--gold);
            font-size: 1.3rem;
            padding: 6px 10px;
        }

        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(6px);
            z-index: 45;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s;
        }
        .backdrop.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* ========================================
           ANIMATIONS
           ======================================== */
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 14px var(--gold); }
            50% { opacity: 0.4; box-shadow: 0 0 4px var(--gold); }
        }

        /* ========================================
           RESPONSIVE
           ======================================== */
        @media (max-width: 992px) {
            body { flex-direction: column; }
            .sidebar {
                position: fixed;
                top: 0; left: 0; bottom: 0;
                transform: translateX(-100%);
                box-shadow: var(--shadow-xl);
                width: 85%;
                max-width: 300px;
            }
            .sidebar.active { transform: translateX(0); }
            .mobile-header { display: flex; }
            .main-content { padding: 12px; gap: 12px; }
            .top-header { display: none; }
            .content-frame-wrapper { border-radius: var(--radius-md); }
        }

        @media (min-width: 993px) {
            .mobile-header { display: none !important; }
            .backdrop { display: none !important; }
        }

        @media (max-width: 480px) {
            .brand-section { padding: 18px 14px 14px; }
            .brand-logo img { height: 38px; }
            .status-badge { font-size: 0.55rem; padding: 4px 12px; }
            .nav-item { padding: 10px 12px; }
            .nav-icon { width: 32px; height: 32px; min-width: 32px; font-size: 0.85rem; margin-right: 10px; }
            .nav-title { font-size: 0.75rem; }
            .nav-desc { font-size: 0.55rem; }
        }
    </style>
</head>
<body>

    <!-- Ambient Glow -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <!-- Mobile Header -->
    <div class="mobile-header">
        <div class="mobile-brand">
            <img src="https://latoto83.com/resources/images/logo.png" alt="LATOTO">
        </div>
        <button class="mobile-menu-btn" onclick="toggleSidebar()" aria-label="Menu">
            <i class="fas fa-bars"></i>
        </button>
    </div>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop" onclick="toggleSidebar()"></div>

    <!-- ========================================
    SIDEBAR
    ======================================== -->
    <aside class="sidebar" id="sidebar">

        <div class="brand-section">
            <div class="brand-logo">
                <img src="https://latoto83.com/resources/images/logo.png" alt="LATOTO">
            </div>
            <div class="status-badge">
                <div class="status-dot"></div>
                <span>Online</span>
            </div>
        </div>

        <nav class="menu-scroll-area">

            <div class="menu-group-label">Menu Utama</div>

            <!-- Kode Tiket -->
            <button class="nav-item active" onclick="navigate(this, 'ticket.html', 'Kode Tiket', 'Promosi &amp; event aktif', 'fa-ticket')">
                <div class="nav-icon"><i class="fa-solid fa-ticket"></i></div>
                <div class="nav-text">
                    <span class="nav-title">Kode Tiket</span>
                    <span class="nav-desc">Event &amp; promosi</span>
                </div>
            </button>

            <!-- Tangkapan Menang -->
            <button class="nav-item" onclick="navigate(this, 'win.html', 'Tangkapan Menang', 'Lampiran bukti kemenangan', 'fa-trophy')">
                <div class="nav-icon"><i class="fa-solid fa-trophy"></i></div>
                <div class="nav-text">
                    <span class="nav-title">Tangkapan Menang</span>
                    <span class="nav-desc">Bukti kemenangan</span>
                </div>
            </button>

            <!-- Profil Bank -->
            <button class="nav-item" onclick="navigate(this, 'bank.html', 'Profil Bank', 'Info bank &amp; e-wallet', 'fa-building-columns')">
                <div class="nav-icon"><i class="fa-solid fa-building-columns"></i></div>
                <div class="nav-text">
                    <span class="nav-title">Profil Bank</span>
                    <span class="nav-desc">Bank &amp; e-wallet</span>
                </div>
            </button>

            <!-- RRN Qiris -->
            <button class="nav-item" onclick="navigate(this, 'rrn.html', 'RRN Qiris', 'Lampiran RRN transaksi', 'fa-receipt')">
                <div class="nav-icon"><i class="fa-solid fa-receipt"></i></div>
                <div class="nav-text">
                    <span class="nav-title">RRN Qiris</span>
                    <span class="nav-desc">Lampiran RRN</span>
                </div>
            </button>

            <!-- Catatan Penting -->
            <button class="nav-item" onclick="navigate(this, 'notes.html', 'Catatan Penting', 'Simpan &amp; kelola catatan', 'fa-sticky-note')">
                <div class="nav-icon"><i class="fa-solid fa-sticky-note"></i></div>
                <div class="nav-text">
                    <span class="nav-title">Catatan Penting</span>
                    <span class="nav-desc">Simpan &amp; kelola</span>
                </div>
            </button>

            <!-- Prediksi Generator -->
            <button class="nav-item" onclick="navigate(this, 'prediksi-generator.html', 'Prediksi Generator', 'Buat prediksi &amp; tabel', 'fa-wand-magic-sparkles')">
                <div class="nav-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
                <div class="nav-text">
                    <span class="nav-title">Prediksi Generator</span>
                    <span class="nav-desc">Buat prediksi &amp; tabel</span>
                </div>
            </button>

            <!-- File Storage -->
            <button class="nav-item" onclick="navigate(this, 'file-storage.html', 'File Storage', 'Simpan .4pk &amp; .zip', 'fa-folder-open')">
                <div class="nav-icon"><i class="fa-solid fa-folder-open"></i></div>
                <div class="nav-text">
                    <span class="nav-title">File Storage</span>
                    <span class="nav-desc">Simpan .4pk &amp; .zip</span>
                </div>
            </button>

        </nav>
    </aside>

    <!-- ========================================
    MAIN CONTENT
    ======================================== -->
    <main class="main-content">

        <!-- Desktop Header -->
        <header class="top-header">
            <div class="header-left">
                <div class="page-icon-box" id="headerIcon"><i class="fa-solid fa-ticket"></i></div>
                <div class="page-title">
                    <h1 id="pageTitle">Kode Tiket</h1>
                    <p id="pageDesc">Promosi &amp; event aktif</p>
                </div>
            </div>
            <div class="header-right">
                <div class="clock-widget">
                    <i class="fa-regular fa-clock"></i>
                    <span id="clock">--:--:--</span>
                </div>
            </div>
        </header>

        <!-- Iframe -->
        <div class="content-frame-wrapper">
            <div class="loader-overlay hidden" id="loader">
                <div class="spinner"></div>
                <div class="loading-text">Memuat Sistem…</div>
            </div>
            <iframe src="ticket.html" id="mainFrame" title="Content" class="loaded"></iframe>
        </div>

    </main>

    <!-- ========================================
    SCRIPT
    ======================================== -->
    <script>
        (function() {
            'use strict';

            // DOM cache
            const els = {
                clock: document.getElementById('clock'),
                loader: document.getElementById('loader'),
                iframe: document.getElementById('mainFrame'),
                sidebar: document.getElementById('sidebar'),
                backdrop: document.getElementById('backdrop'),
                pageTitle: document.getElementById('pageTitle'),
                pageDesc: document.getElementById('pageDesc'),
                headerIcon: document.getElementById('headerIcon'),
                navItems: document.querySelectorAll('.nav-item')
            };

            let currentUrl = 'ticket.html';

            // ==========================================
            // CLOCK
            // ==========================================
            function updateClock() {
                const now = new Date();
                els.clock.textContent = now.toLocaleTimeString('id-ID', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
            }
            updateClock();
            setInterval(updateClock, 1000);

            // ==========================================
            // NAVIGATION
            // ==========================================
            function navigate(btn, url, title, desc, iconClass) {
                // Active state
                els.navItems.forEach(item => item.classList.remove('active'));
                btn.classList.add('active');

                // Header
                els.pageTitle.textContent = title;
                els.pageDesc.textContent = desc;
                els.headerIcon.innerHTML = `<i class="fa-solid ${iconClass}"></i>`;

                // Same page?
                if (currentUrl === url) {
                    if (window.innerWidth <= 992) toggleSidebar();
                    return;
                }

                // Load
                currentUrl = url;
                els.loader.classList.remove('hidden');
                els.iframe.classList.remove('loaded');
                els.iframe.src = url;

                if (window.innerWidth <= 992) toggleSidebar();
            }

            // Iframe load
            els.iframe.onload = function() {
                setTimeout(function() {
                    els.loader.classList.add('hidden');
                    els.iframe.classList.add('loaded');
                }, 350);
            };

            // ==========================================
            // SIDEBAR TOGGLE (mobile)
            // ==========================================
            window.toggleSidebar = function() {
                els.sidebar.classList.toggle('active');
                els.backdrop.classList.toggle('active');
            };

            // Close sidebar on resize to desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 992) {
                    els.sidebar.classList.remove('active');
                    els.backdrop.classList.remove('active');
                }
            });

            // Expose navigate globally
            window.navigate = navigate;

        })();
    </script>

</body>
</html>
