<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catatan Penting · LATOTO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ===== THEME GOLD NEON ===== */
    :root {
      --bg: #080c18;
      --bg-card: rgba(14,21,40,0.75);
      --bg-card-hover: rgba(20,30,55,0.85);
      --border: rgba(255,215,0,0.08);
      --border-hover: rgba(245,200,66,0.25);
      --gold: #f5c842;
      --gold-bg: rgba(245,200,66,0.08);
      --gold-glow: rgba(245,200,66,0.15);
      --coral: #f87171;
      --coral-bg: rgba(248,113,113,0.08);
      --text: #f0ead8;
      --text-2: #8899b0;
      --text-3: #4a5a72;
      --r: 14px;
      --r-sm: 10px;
      --ease: all 0.35s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"] {
      --bg: #f0ece4;
      --bg-card: rgba(255,255,255,0.75);
      --bg-card-hover: rgba(255,255,255,0.9);
      --border: rgba(160,130,20,0.12);
      --border-hover: rgba(245,200,66,0.3);
      --gold: #b8860b;
      --gold-bg: rgba(184,134,11,0.06);
      --text: #1a1a2e;
      --text-2: #4a5568;
      --text-3: #8896aa;
    }
    [data-theme="cyan"] {
      --bg: #061218;
      --bg-card: rgba(8,28,38,0.75);
      --bg-card-hover: rgba(12,36,48,0.85);
      --border: rgba(0,212,180,0.12);
      --border-hover: rgba(0,212,180,0.3);
      --gold: #00d4b4;
      --gold-bg: rgba(0,212,180,0.08);
      --text: #d6f3f0;
      --text-2: #8bc9c0;
      --text-3: #4a8a7e;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background 0.3s, color 0.3s;
      padding: 28px;
    }
    .panel { max-width:1200px; margin:0 auto; }
    .panel-head {
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:24px; flex-wrap:wrap; gap:14px;
    }
    .panel-head-left { display:flex; align-items:center; gap:14px; }
    .panel-icon {
      width:40px; height:40px; border-radius:var(--r-sm);
      background:var(--gold-bg); border:1px solid rgba(245,200,66,0.12);
      display:flex; align-items:center; justify-content:center;
      color:var(--gold); font-size:0.95rem; flex-shrink:0;
      transition: var(--ease);
    }
    .panel-title {
      font-family:'Bebas Neue',sans-serif; font-size:1.35rem;
      letter-spacing:2px; color:var(--text); line-height:1.1;
    }
    .panel-subtitle { font-size:0.7rem; color:var(--text-3); letter-spacing:0.3px; margin-top:2px; }
    .panel-badges { display:flex; gap:8px; flex-wrap:wrap; }
    .p-badge {
      padding:6px 14px; border-radius:100px; font-size:0.68rem; font-weight:600;
      letter-spacing:0.5px; border:1px solid var(--border);
      background:rgba(255,255,255,0.02); color:var(--text-2);
      display:flex; align-items:center; gap:6px;
      transition: var(--ease);
    }
    .p-badge i { font-size:0.65rem; }
    .p-badge.b-gold i { color:var(--gold); }
    .p-badge.b-coral i { color:var(--coral); }

    .toolbar {
      display:flex; align-items:center; gap:10px;
      margin-bottom:20px; flex-wrap:wrap;
    }
    .btn-add {
      padding:10px 22px;
      background:var(--gold);
      color:#0a0e1a;
      border:none;
      border-radius:100px;
      font-weight:700;
      font-size:0.8rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:var(--ease);
      font-family:'Outfit',sans-serif;
      box-shadow:0 4px 18px var(--gold-glow);
    }
    .btn-add:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 28px var(--gold-glow);
    }

    .notes-grid {
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(280px, 1fr));
      gap:18px;
    }

    .note-card {
      background:var(--bg-card);
      backdrop-filter:blur(12px);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:16px 18px 14px;
      transition:var(--ease);
      position:relative;
      display:flex;
      flex-direction:column;
      cursor:default;
    }
    .note-card:hover {
      border-color:var(--border-hover);
      transform:translateY(-4px);
      box-shadow:0 12px 32px rgba(0,0,0,0.35),0 0 20px rgba(245,200,66,0.05);
      background:var(--bg-card-hover);
    }
    .note-header {
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:8px;
      gap:8px;
    }
    .note-title {
      font-weight:700;
      font-size:0.9rem;
      color:var(--text);
      background:transparent;
      border:none;
      outline:none;
      width:100%;
      font-family:'Outfit',sans-serif;
      padding:2px 4px;
      border-radius:4px;
      transition:var(--ease);
      cursor:text;
    }
    .note-title:focus {
      background:rgba(245,200,66,0.06);
      box-shadow:0 0 0 2px var(--gold);
    }

    /* ===== TEXTAREA BODY (BISA DIEDIT) ===== */
    .note-body {
      font-size:0.78rem;
      color:var(--text-2);
      background:transparent;
      border:none;
      outline:none;
      resize:vertical;
      width:100%;
      min-height:80px;
      max-height:300px;
      font-family:'Outfit',sans-serif;
      padding:4px 4px;
      border-radius:4px;
      transition:var(--ease);
      line-height:1.6;
      flex:1;
      scrollbar-width:thin;
    }
    .note-body:focus {
      background:rgba(245,200,66,0.04);
      box-shadow:0 0 0 2px var(--gold);
    }
    .note-body::-webkit-scrollbar {
      width:4px;
    }
    .note-body::-webkit-scrollbar-thumb {
      background:rgba(255,215,0,0.15);
      border-radius:10px;
    }

    .note-footer {
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top:10px;
      border-top:1px solid var(--border);
      padding-top:10px;
      font-size:0.6rem;
      color:var(--text-3);
    }
    .note-date {
      font-family:'JetBrains Mono',monospace;
    }
    .note-actions {
      display:flex;
      gap:6px;
    }
    .note-actions button {
      background:transparent;
      border:none;
      color:var(--text-3);
      cursor:pointer;
      font-size:0.75rem;
      padding:4px 6px;
      border-radius:4px;
      transition:var(--ease);
    }
    .note-actions button:hover {
      background:var(--coral-bg);
      color:var(--coral);
    }
    .note-actions .btn-pin {
      color:var(--gold);
    }
    .note-actions .btn-pin:hover {
      background:var(--gold-bg);
    }
    .note-actions .btn-expand {
      color:var(--text-2);
    }
    .note-actions .btn-expand:hover {
      background:var(--gold-bg);
      color:var(--gold);
    }

    .note-card.pinned {
      border-color:rgba(245,200,66,0.25);
      background:rgba(245,200,66,0.04);
    }
    .note-card.pinned .note-title {
      color:var(--gold);
    }

    .empty-state {
      grid-column:1/-1;
      text-align:center;
      padding:60px 20px;
      color:var(--text-3);
    }
    .empty-state i {
      font-size:2.4rem;
      opacity:0.3;
      margin-bottom:14px;
      display:block;
    }
    .empty-state p {
      font-size:0.85rem;
    }
    .empty-state strong {
      color:var(--text-2);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position:fixed;
      inset:0;
      background:rgba(4,8,16,0.92);
      backdrop-filter:blur(30px);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:2000;
      padding:20px;
      opacity:0;
      visibility:hidden;
      transition:var(--ease);
    }
    .modal-overlay.active {
      opacity:1;
      visibility:visible;
    }
    .modal-box {
      background:linear-gradient(165deg,rgba(15,25,48,0.97),rgba(10,16,30,0.99));
      border:1px solid var(--border);
      border-radius:20px;
      width:100%;
      max-width:700px;
      max-height:90vh;
      overflow:hidden;
      transform:scale(0.93) translateY(30px);
      transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 40px 80px rgba(0,0,0,0.5);
      position:relative;
      display:flex;
      flex-direction:column;
    }
    .modal-overlay.active .modal-box {
      transform:scale(1) translateY(0);
    }
    .modal-box::before {
      content:'';
      position:absolute;
      top:0;
      left:0;
      right:0;
      height:2px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:0.5;
    }
    .modal-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:18px 24px;
      border-bottom:1px solid var(--border);
      flex-shrink:0;
    }
    .modal-title {
      font-family:'Bebas Neue',sans-serif;
      font-size:1.2rem;
      letter-spacing:1.5px;
      color:var(--text);
      overflow:hidden;
      text-overflow:ellipsis;
      white-space:nowrap;
      padding-right:14px;
    }
    .modal-close {
      width:36px;
      height:36px;
      border-radius:var(--r-sm);
      border:1px solid var(--border);
      background:transparent;
      color:var(--text-3);
      font-size:0.9rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:var(--ease);
      flex-shrink:0;
    }
    .modal-close:hover {
      background:var(--coral-bg);
      border-color:rgba(248,113,113,0.2);
      color:var(--coral);
      transform:rotate(90deg);
    }
    .modal-body {
      padding:24px;
      overflow-y:auto;
      flex:1;
      max-height:calc(90vh - 140px);
    }
    .modal-body .modal-note-content {
      white-space:pre-wrap;
      word-break:break-word;
      font-size:0.9rem;
      line-height:1.7;
      color:var(--text-2);
    }
    .modal-footer {
      padding:16px 24px;
      border-top:1px solid var(--border);
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      flex-shrink:0;
    }
    .modal-btn {
      padding:10px 20px;
      border-radius:var(--r-sm);
      font-family:'Outfit',sans-serif;
      font-weight:600;
      font-size:0.8rem;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:8px;
      transition:var(--ease);
      border:none;
    }
    .modal-btn-copy {
      background:linear-gradient(135deg,var(--gold),#b8860b);
      color:#0a0e1a;
      box-shadow:0 4px 18px var(--gold-glow);
    }
    .modal-btn-copy:hover {
      transform:translateY(-2px);
      box-shadow:0 8px 28px var(--gold-glow);
    }
    .modal-btn-close {
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      color:var(--text-2);
    }
    .modal-btn-close:hover {
      border-color:var(--border-hover);
      color:var(--text);
      background:var(--gold-bg);
    }

    .toast {
      position:fixed; bottom:24px; right:24px; z-index:3000;
      display:flex; align-items:center; gap:12px; padding:14px 20px;
      background:rgba(12,20,38,0.95); backdrop-filter:blur(16px);
      border:1px solid rgba(245,200,66,0.15); border-radius:var(--r);
      box-shadow:0 16px 40px rgba(0,0,0,0.35);
      transform:translateX(calc(100% + 30px)); opacity:0;
      transition:all 0.45s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.on { transform:translateX(0); opacity:1; }
    .toast-ic { width:32px; height:32px; border-radius:9px; background:rgba(245,200,66,0.1); display:flex; align-items:center; justify-content:center; color:var(--gold); font-size:0.8rem; flex-shrink:0; }
    .toast-msg { font-weight:600; font-size:0.8rem; color:var(--text); }
    .toast-msg small { display:block; font-weight:400; font-size:0.65rem; color:var(--text-3); margin-top:1px; }

    @media(max-width:640px){
      body{padding:16px;}
      .panel-head{flex-direction:column;align-items:flex-start;}
      .panel-badges{width:100%;}
      .toolbar{flex-direction:column;align-items:stretch;}
      .notes-grid{grid-template-columns:1fr;}
      .modal-box{max-width:100%;margin:10px;}
      .modal-header{padding:14px 16px;}
      .modal-title{font-size:1rem;}
      .modal-body{padding:16px;}
      .modal-footer{flex-direction:column;}
      .modal-btn{justify-content:center;}
    }
    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.1); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(255,215,0,0.3); }
  </style>
</head>
<body>

<div class="panel">
  <div class="panel-head">
    <div class="panel-head-left">
      <div class="panel-icon"><i class="fas fa-sticky-note"></i></div>
      <div>
        <div class="panel-title">CATATAN PENTING</div>
        <div class="panel-subtitle">Simpan &amp; kelola catatan kerja CS</div>
      </div>
    </div>
    <div class="panel-badges">
      <div class="p-badge b-gold"><i class="fas fa-layer-group"></i> <span id="countBadge">0</span> Catatan</div>
      <div class="p-badge b-gold"><i class="fas fa-thumbtack"></i> <span id="pinnedBadge">0</span> Disematkan</div>
      <div class="p-badge b-coral"><i class="fas fa-clock"></i> <span id="clock">--:--</span></div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-add" id="btnAddNote"><i class="fas fa-plus"></i> Tambah Catatan</button>
    <div style="flex:1"></div>
    <span style="font-size:0.65rem;color:var(--text-3);"><i class="fas fa-save"></i> Tersimpan otomatis</span>
  </div>

  <div class="notes-grid" id="notesGrid"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">Judul</div>
      <button class="modal-close" id="modalClose"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-note-content" id="modalContent"></div>
    </div>
    <div class="modal-footer">
      <button class="modal-btn modal-btn-copy" id="modalCopy"><i class="fas fa-copy"></i> Salin Isi</button>
      <button class="modal-btn modal-btn-close" id="modalCloseBtn">Tutup</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <div class="toast-ic"><i class="fas fa-check"></i></div>
  <div class="toast-msg"><span id="tMsg">OK</span><small id="tSub"></small></div>
</div>

<script>
(function(){
  const $ = id => document.getElementById(id);
  const grid = $('notesGrid');
  const countBadge = $('countBadge');
  const pinnedBadge = $('pinnedBadge');
  const clockEl = $('clock');
  const modalOverlay = $('modalOverlay');
  const modalTitle = $('modalTitle');
  const modalContent = $('modalContent');
  const modalCopy = $('modalCopy');
  const modalClose = $('modalClose');
  const modalCloseBtn = $('modalCloseBtn');

  let notes = [];
  const STORAGE_KEY = 'latoto_notes';

  // Default notes
  const DEFAULT_NOTES = [
    {
      id: 'mqpqxsbbaq4h',
      title: 'Withdraw Pending QRIS',
      body: `Untuk perihal penarikan dana withdraw anda dengan nominal xxx , saat ini masih dalam proses pengecekan oleh tim kami ya bosku. tidak perlu khawatir saldo anda aman dan akan langsung kami proses setelah pengecekan selesai. mohon kesabarannya untuk menunggu Estimasi tidak dapat kami pastikan ya bosku 
=====

Terkait penarikan dana withdraw anda saat ini masih dalam proses pengecekan oleh tim kami. saldo pengajuan withdraw anda tetap aman dan akan segera kami proses setelah pengecekan selesai ya bosku.

=====

Kami informasikan bahwa proses withdraw akan saat ini dalam pengecekan tim kami. silakan cek mutasi rekening anda secara berkala ya bosku Dan untuk estimasi Tidak dapat kami pastikan , Hingga Pengchekan selesai dilakukan ya bosku .
Terima kasih atas perhatian anda.`,
      pinned: true,
      createdAt: Date.now() - 3600000,
      updatedAt: Date.now() - 3600000
    },
    {
      id: 'mqpr2vpmu0ii',
      title: 'DANA Ke QRIS',
      body: `Yth, Member setia LATOTO, Kami ingin menginformasikan untuk saat ini perihal deposit E-Wallet DANA sedang di alihkan ke QRIS terlebih dahulu dan silahkan melakukan deposit menggunakan scan barcode tersebut ya. Terimakasih.`,
      pinned: true,
      createdAt: Date.now() - 7200000,
      updatedAt: Date.now() - 7200000
    },
    {
      id: 'mqpr83nxfmgw',
      title: 'Lucky Wheel',
      body: `Yth Member Setia LATOTO,Kami informasikan saat ini kami memiliki fitur terbaru yaitu Lucky Wheel yang bisa anda dapatkan setiap harinya dengan syarat dan ketentuan sebagai berikut :

1.Memiliki transaksi deposit di hari sebelumnya
2. Apabila ditemukan kecurangan atau transaksi tidak normal, maka bonus dianggap hangus.
3. Semua keputusan management bersifat mutlak dan tidak dapat diganggu gugat.

List Bonus Freespin :

1. Free chips Rp. 5.000,- ( Bonus langsung masuk ke saldo akun anda ).
2. Bonus deposit 15%, Bonus deposit, diambil dari last deposit di hari sebelumnya kemudian di kali dengan angka persentase bonus. Contoh deposit terakhir adalah 100.000 x 15% = 15.000,-
3. Bonus cashback kekalahan 5%, Bonus cashback kekalahan, nilai kekalahan diambil dari keseluruhan nilai kalah di hari sebelumnya di kali dengan persentase bonus. Contoh di hari sebelumnya 00.01 wib se 23.59 wib total kalahnya 100.000 x 5% = 5.000,-
4. Bonus rollingan turnover 1%, Bonus rolling turnover, nilai turnover diambil dari keseluruhan turnover di hari sebelumnya. Contoh TO 00.01 sd 23.59 di hari sebelumnya adalah 1.000.000 x 1% = 10.000,-
5. Zonk artinya anda belum beruntung dan tidak mendapatkan bonus. Silahkan dicoba kembali di hari berikutnya`,
      pinned: true,
      createdAt: Date.now() - 10800000,
      updatedAt: Date.now() - 10800000
    },
    {
      id: 'mqpr8m99yusw',
      title: 'Bonus kekalahan',
      body: `Untuk pembagian Bonus Cashback Kekalahan Sportbook, Live Games & Slot Games yang jadwalnya pada hari Senin mohon ditunggu paling lambat dalam waktu 1x24 jam ya bosku.
======================
Untuk perihal Bonus Cashback mohon ditunggu paling lambat 1x24 jam ya bosku, karena masih dalam perhitungan dan jika sudah sesuai dengan syarat & ketentuan maka akan otomatis masuk ke dalam akun anda ya bosku.
====================
Untuk perihal Bonus nya mohon ditunggu paling lambat dalam estimasi waktu 1x24 jam ya bosku.`,
      pinned: true,
      createdAt: Date.now() - 14400000,
      updatedAt: Date.now() - 14400000
    }
  ];

  function loadNotes() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed) && parsed.length > 0) {
          notes = parsed;
          return;
        }
      }
    } catch(e) {}
    notes = JSON.parse(JSON.stringify(DEFAULT_NOTES));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
  }

  function saveNotes() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    render();
  }

  function genId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
  }

  function formatDate(ts) {
    const d = new Date(ts);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const isThisYear = d.getFullYear() === now.getFullYear();
    const time = d.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    if (isToday) return `Hari ini, ${time}`;
    if (isThisYear) {
      return d.toLocaleDateString('id-ID', {day:'numeric', month:'short'}) + `, ${time}`;
    }
    return d.toLocaleDateString('id-ID', {day:'numeric', month:'short', year:'numeric'}) + `, ${time}`;
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }

  // Auto-resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = el.scrollHeight + 'px';
  }

  function render() {
    const sorted = [...notes].sort((a,b) => {
      if (a.pinned && !b.pinned) return -1;
      if (!a.pinned && b.pinned) return 1;
      return b.updatedAt - a.updatedAt;
    });

    countBadge.textContent = notes.length;
    pinnedBadge.textContent = notes.filter(n => n.pinned).length;

    if (notes.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-sticky-note"></i>
          <p>Belum ada catatan. Klik <strong>“Tambah Catatan”</strong> untuk mulai menulis.</p>
        </div>
      `;
      return;
    }

    grid.innerHTML = sorted.map(note => `
      <div class="note-card ${note.pinned ? 'pinned' : ''}" data-id="${note.id}">
        <div class="note-header">
          <input class="note-title" type="text" value="${escapeHtml(note.title)}" placeholder="Judul catatan..." data-field="title">
          <button class="btn-pin" data-action="pin" title="${note.pinned ? 'Lepas pin' : 'Sematkan'}">
            <i class="fas fa-thumbtack" style="${note.pinned ? 'color:var(--gold);transform:rotate(-45deg);' : 'opacity:0.4;'}"></i>
          </button>
        </div>
        <textarea class="note-body" placeholder="Tulis catatan di sini..." data-field="body">${escapeHtml(note.body)}</textarea>
        <div class="note-footer">
          <span class="note-date"><i class="far fa-clock"></i> ${formatDate(note.updatedAt)}</span>
          <div class="note-actions">
            <button class="btn-expand" data-action="expand" title="Lihat lengkap"><i class="fas fa-expand"></i></button>
            <button data-action="delete" title="Hapus catatan"><i class="fas fa-trash"></i></button>
          </div>
        </div>
      </div>
    `).join('');

    // Event listeners
    grid.querySelectorAll('.note-card').forEach(card => {
      const id = card.dataset.id;

      // Title - simpan saat blur
      const titleInput = card.querySelector('.note-title');
      titleInput.addEventListener('blur', function() {
        updateNoteField(id, 'title', this.value);
      });
      titleInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') this.blur();
      });

      // Body textarea - simpan saat blur & auto-resize
      const bodyTextarea = card.querySelector('.note-body');
      bodyTextarea.addEventListener('input', function() {
        autoResize(this);
        // Simpan dengan debounce sederhana
        clearTimeout(this._saveTimer);
        this._saveTimer = setTimeout(() => {
          updateNoteField(id, 'body', this.value);
        }, 300);
      });
      bodyTextarea.addEventListener('blur', function() {
        clearTimeout(this._saveTimer);
        updateNoteField(id, 'body', this.value);
      });
      // Auto-resize awal
      setTimeout(() => autoResize(bodyTextarea), 10);

      // Pin button
      const pinBtn = card.querySelector('[data-action="pin"]');
      pinBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        togglePin(id);
      });

      // Delete button
      const delBtn = card.querySelector('[data-action="delete"]');
      delBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        deleteNote(id);
      });

      // Expand button -> open modal
      const expandBtn = card.querySelector('[data-action="expand"]');
      expandBtn.addEventListener('click', function(e) {
        e.stopPropagation();
        openModal(id);
      });

      // Double-click card (but not on input/button) -> open modal
      card.addEventListener('dblclick', function(e) {
        if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.closest('button')) return;
        openModal(id);
      });
    });
  }

  function updateNoteField(id, field, value) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    note[field] = value;
    note.updatedAt = Date.now();
    // Simpan tapi tanpa render ulang penuh agar textarea tidak kehilangan fokus
    localStorage.setItem(STORAGE_KEY, JSON.stringify(notes));
    // Update badge & date saja tanpa re-render penuh
    countBadge.textContent = notes.length;
    pinnedBadge.textContent = notes.filter(n => n.pinned).length;
    // Update date di footer
    const card = document.querySelector(`.note-card[data-id="${id}"]`);
    if (card) {
      const dateEl = card.querySelector('.note-date');
      if (dateEl) dateEl.innerHTML = `<i class="far fa-clock"></i> ${formatDate(note.updatedAt)}`;
    }
  }

  function togglePin(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    note.pinned = !note.pinned;
    note.updatedAt = Date.now();
    saveNotes();
    toast(note.pinned ? 'Catatan disematkan' : 'Pin dilepas');
  }

  function deleteNote(id) {
    if (!confirm('Hapus catatan ini?')) return;
    notes = notes.filter(n => n.id !== id);
    saveNotes();
    toast('Catatan dihapus');
  }

  function addNote() {
    const now = Date.now();
    const newNote = {
      id: genId(),
      title: 'Catatan baru',
      body: 'Tulis sesuatu di sini...',
      pinned: false,
      createdAt: now,
      updatedAt: now
    };
    notes.unshift(newNote);
    saveNotes();
    toast('Catatan baru ditambahkan');

    setTimeout(() => {
      const firstCard = grid.querySelector('.note-card');
      if (firstCard) {
        const titleInput = firstCard.querySelector('.note-title');
        if (titleInput) {
          titleInput.focus();
          titleInput.select();
        }
      }
    }, 50);
  }

  // ===== MODAL =====
  function openModal(id) {
    const note = notes.find(n => n.id === id);
    if (!note) return;
    modalTitle.textContent = note.title || 'Tanpa Judul';
    modalContent.textContent = note.body || '(Kosong)';
    modalOverlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    modalOverlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  function copyModalContent() {
    const text = modalContent.textContent;
    if (!text) return;
    navigator.clipboard.writeText(text).then(() => {
      toast('Isi catatan disalin ke clipboard');
    }).catch(() => {
      const textarea = document.createElement('textarea');
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
      toast('Isi catatan disalin ke clipboard');
    });
  }

  modalClose.addEventListener('click', closeModal);
  modalCloseBtn.addEventListener('click', closeModal);
  modalOverlay.addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });
  modalCopy.addEventListener('click', copyModalContent);

  function toast(msg, sub='') {
    $('tMsg').textContent = msg;
    $('tSub').textContent = sub || '';
    const t = $('toast');
    t.classList.add('on');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('on'), 2500);
  }

  function updateClock() {
    const now = new Date();
    clockEl.textContent = now.toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
  }
  updateClock();
  setInterval(updateClock, 10000);

  loadNotes();
  render();

  $('btnAddNote').addEventListener('click', addNote);

  // Theme sync
  (function syncTheme() {
    const valid = ['dark','light','cyan'];
    const saved = localStorage.getItem('cs-theme');
    if (saved && valid.includes(saved)) document.documentElement.setAttribute('data-theme', saved);
    else document.documentElement.setAttribute('data-theme','dark');
    window.addEventListener('storage', e => {
      if (e.key === 'cs-theme' && valid.includes(e.newValue)) {
        document.documentElement.setAttribute('data-theme', e.newValue);
      }
    });
    window.addEventListener('message', e => {
      if (e.data?.type === 'themeChange' && valid.includes(e.data.theme)) {
        document.documentElement.setAttribute('data-theme', e.data.theme);
      }
    });
  })();

})();
</script>
</body>
</html>
