<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LATOTO Prediksi Bola Generator</title>
    <style>
        /* ===== RESET & BASE ===== */
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#050505;
            background-image:radial-gradient(circle at 16% 10%,rgba(245,200,66,.25) 0%,transparent 30%),radial-gradient(circle at 88% 16%,rgba(245,200,66,.30) 0%,transparent 35%),linear-gradient(135deg,#050505,#1a1500 46%,#050505 100%);
            min-height:100vh;color:#fff;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
            display:flex;justify-content:center;align-items:flex-start;padding:12px;
        }

        .container{
            max-width:1000px;width:100%;max-height:4138px;height:100vh;overflow-y:auto;
            padding:12px 10px 20px;background:rgba(5,5,5,0.85);border-radius:16px;
            border:1px solid rgba(245,200,66,0.15);box-shadow:0 0 40px rgba(245,200,66,0.05);
            scrollbar-width:thin;
        }
        .container::-webkit-scrollbar{width:4px;}
        .container::-webkit-scrollbar-thumb{background:rgba(245,200,66,0.2);border-radius:10px;}

        /* ===== HEADER ===== */
        .header{
            text-align:center;padding:14px 10px;margin-bottom:14px;
            background:linear-gradient(135deg,#050505,#1a1500,#c49e1f,#1a1500,#050505);
            background-size:400% 400%;border-radius:12px;border:1px solid #c49e1f;
            animation:gradientShift 8s ease infinite,neonPulse 3s infinite ease-in-out;
        }
        .header h1{color:#f5c842;font-size:1.4rem;font-weight:900;letter-spacing:2px;}
        .header p{color:#ccc;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.5px;opacity:0.7;}

        @keyframes neonPulse{
            0%{box-shadow:0 0 10px rgba(245,200,66,0.15);border-color:#c49e1f;}
            50%{box-shadow:0 0 25px rgba(245,200,66,0.35);border-color:#f5c842;}
            100%{box-shadow:0 0 10px rgba(245,200,66,0.15);border-color:#c49e1f;}
        }
        @keyframes gradientShift{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

        /* ===== PANEL ===== */
        .panel{background:rgba(5,5,5,0.9);border-radius:12px;padding:14px;margin-bottom:14px;border:1px solid rgba(245,200,66,0.08);}

        .input-section label{display:block;color:#f5c842;font-size:0.75rem;font-weight:700;letter-spacing:0.5px;margin-bottom:6px;}
        textarea{
            width:100%;height:100px;padding:10px;
            background:rgba(255,255,255,0.03);border:1px solid rgba(245,200,66,0.15);
            border-radius:8px;color:#ddd;font-size:0.75rem;line-height:1.5;
            resize:vertical;transition:0.3s;font-family:inherit;
        }
        textarea:focus{outline:none;border-color:#f5c842;box-shadow:0 0 15px rgba(245,200,66,0.15);}

        .buttons{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
        .btn{
            padding:8px 16px;border:none;border-radius:8px;font-size:0.7rem;font-weight:700;
            cursor:pointer;transition:0.3s;flex:1;min-width:120px;text-transform:uppercase;letter-spacing:0.5px;
            font-family:inherit;
        }
        .btn-generate{
            background:linear-gradient(90deg,#f5c842,#c49e1f,#f5c842);background-size:200% auto;
            color:#000;box-shadow:0 0 15px rgba(245,200,66,0.2);
        }
        .btn-generate:hover{background-position:right center;transform:translateY(-1px);box-shadow:0 0 25px rgba(245,200,66,0.4);}
        .btn-copy{
            background:#111;color:#f5c842;border:1px solid #f5c842;
        }
        .btn-copy:hover{background:#f5c842;color:#000;}

        /* ===== SETTINGS (compact) ===== */
        .settings-panel{
            background:rgba(0,0,0,0.3);border-radius:10px;padding:12px;margin:10px 0;
            border:1px solid rgba(245,200,66,0.06);
        }
        .settings-title{color:#f5c842;font-size:0.7rem;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
        .settings-grid{
            display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px;
        }
        .setting-group label{display:block;color:#aaa;font-size:0.6rem;font-weight:600;margin-bottom:3px;}
        .color-picker-wrapper{display:flex;gap:6px;align-items:center;}
        .color-block-preview{width:24px;height:24px;border-radius:4px;border:1px solid rgba(245,200,66,0.2);}
        input[type="color"]{width:40px;height:28px;border:1px solid rgba(245,200,66,0.2);border-radius:4px;background:transparent;cursor:pointer;}
        input[type="range"]{width:100%;height:4px;background:#1a1500;border-radius:2px;outline:none;accent-color:#f5c842;}
        .range-info{display:flex;justify-content:space-between;font-size:0.55rem;color:#888;}
        .range-value{color:#f5c842;font-weight:700;}
        .font-dropdown{
            width:100%;padding:6px 8px;background:#000;border:1px solid rgba(245,200,66,0.15);
            border-radius:4px;color:#fff;font-size:0.65rem;cursor:pointer;font-family:inherit;
        }
        .font-quick-grid{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px;}
        .font-mini-card{
            padding:3px 8px;background:rgba(0,0,0,0.4);border:1px solid rgba(245,200,66,0.08);
            border-radius:4px;cursor:pointer;font-size:0.55rem;color:#888;transition:0.2s;
        }
        .font-mini-card:hover,.font-mini-card.active{border-color:#f5c842;color:#fff;background:rgba(245,200,66,0.08);}
        .preset-container{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
        .preset-pill{
            padding:4px 12px;background:rgba(0,0,0,0.4);border:1px solid rgba(245,200,66,0.08);
            border-radius:12px;color:#aaa;cursor:pointer;font-size:0.55rem;font-weight:600;transition:0.2s;
        }
        .preset-pill:hover{border-color:#f5c842;color:#f5c842;}

        /* ===== LIVE PREVIEW ===== */
        .preview-label{color:#f5c842;font-size:0.75rem;font-weight:700;display:block;margin-bottom:8px;}
        #tablesContainer{
            max-height:280px;overflow-y:auto;border-radius:8px;border:1px solid rgba(245,200,66,0.06);
            padding:6px;background:rgba(0,0,0,0.2);
        }
        #tablesContainer::-webkit-scrollbar{width:3px;}
        #tablesContainer::-webkit-scrollbar-thumb{background:rgba(245,200,66,0.15);border-radius:10px;}

        .preview-area{
            background:#000;border-radius:8px;padding:10px;margin-top:8px;
            border:1px solid rgba(245,200,66,0.08);max-height:180px;overflow-y:auto;
        }
        #previewOutput{
            color:#ccc;font-family:'Courier New',monospace;font-size:0.6rem;
            white-space:pre-wrap;word-break:break-all;line-height:1.4;
        }

        .footer{text-align:center;padding:10px;color:#666;font-size:0.55rem;border-top:1px solid rgba(245,200,66,0.05);margin-top:8px;}

        .notification{
            position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
            background:linear-gradient(135deg,#f5c842,#c49e1f);color:#000;
            padding:8px 20px;border-radius:8px;font-weight:700;font-size:0.7rem;
            opacity:0;transition:0.3s;z-index:1000;box-shadow:0 0 30px rgba(245,200,66,0.3);
            pointer-events:none;white-space:nowrap;
        }
        .notification.show{opacity:1;transform:translateX(-50%) translateY(0);}

        /* ===== STYLE UNTUK LEAGUE BLOCK (compact) ===== */
        .ht-bola-box{
            max-width:100%;margin:0;padding:10px;background:#070707;
            border:2px solid #c49e1f;border-radius:12px;font-family:'Segoe UI',sans-serif;
            box-shadow:0 0 20px rgba(225,173,1,.20);color:#fff;font-size:0.7rem;
        }
        .ht-main-title{background:linear-gradient(90deg,#000,#171100,#0058E6,#171100,#000);padding:8px;margin-bottom:12px;border-radius:8px;border:1px solid #c49e1f;text-align:center;animation:htGoldGlow 3s infinite ease-in-out;}
        .ht-title-text{display:block;white-space:nowrap;color:#f5c842;font-size:16px;font-weight:900;letter-spacing:1px;text-transform:uppercase;text-shadow:0 1px 0 #fff7b0,0 1px 0 #ffc400,0 0 10px rgba(255,215,0,.6);}
        .ht-title-text img.emoji{width:18px;height:18px;vertical-align:middle;display:inline-block;}
        .ht-filter-box{background:linear-gradient(180deg,#050505,#0b0b0b);border:1px solid #c49e1f;border-radius:8px;padding:8px 10px;margin:0 0 12px 0;box-shadow:0 0 10px rgba(225,173,1,.15);}
        .ht-filter-label{display:block;color:#f5c842;font-weight:900;font-size:12px;margin-bottom:5px;letter-spacing:.3px;}
        .ht-filter-label img.emoji{width:16px;height:16px;vertical-align:middle;}
        .ht-select{width:100%;padding:6px 10px;border-radius:8px;border:1px solid #f5c842;background:#050505;color:#fff;font-weight:700;font-size:11px;outline:none;cursor:pointer;text-transform:uppercase;font-family:inherit;}
        .ht-select option{background:#050505;color:#fff;font-weight:700;}
        .ht-league{margin-bottom:14px;border:2px solid #c49e1f;border-radius:12px;overflow:hidden;background:#001A5C;animation:htGoldGlow 4s infinite ease-in-out;}
        @keyframes htGoldGlow{0%{box-shadow:0 0 8px rgba(225,173,1,.15)}50%{box-shadow:0 0 20px rgba(225,173,1,.35)}100%{box-shadow:0 0 8px rgba(225,173,1,.15)}}
        .ht-league-head{display:flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(90deg,#000,#241800,#001A5C,#241800,#000);background-size:300% 100%;color:#f5c842;padding:6px 30px;font-weight:900;letter-spacing:1px;font-size:11px;text-transform:uppercase;text-shadow:0 1px 0 #fff7b0,0 1px 0 #FF8C00,0 0 6px rgba(255,215,0,.3);border-bottom:1px solid rgba(255,215,0,.5);animation:htSeaSparkle 4s ease infinite;background-size:300% 100%;position:relative;overflow:hidden;}
        .ht-league-head img.emoji{width:14px;height:14px;vertical-align:middle;}
        .ht-count{background:#f5c842;color:#111;border-radius:12px;padding:1px 6px;font-size:7px;letter-spacing:0;margin-left:4px;}
        .ht-match{background:linear-gradient(180deg,#00246B,#001A5C);border-bottom:1px solid rgba(225,173,1,.15);}
        .ht-match:nth-child(even){background:linear-gradient(180deg,#001F66,#00144A)}
        .ht-row{display:grid;grid-template-columns:minmax(0,1fr) 80px minmax(0,1fr);align-items:center;min-height:56px;padding:6px 8px;gap:6px;}
        .ht-team{display:flex;align-items:center;gap:5px;color:#FFF5CC;font-weight:900;font-size:11px;text-shadow:0 1px 2px #000;min-width:0;}
        .ht-team.right{justify-content:flex-end;text-align:right;}
        .ht-name{white-space:normal;line-height:1.15;word-break:break-word;font-size:10px;}
        .ht-logo{width:24px;height:24px;object-fit:contain;flex:0 0 24px;background:transparent!important;padding:0!important;border:none!important;filter:drop-shadow(0 0 2px rgba(0,0,0,.3));}
        .ht-ball{width:24px;height:24px;flex:0 0 24px;display:inline-flex;align-items:center;justify-content:center;background:transparent!important;border:none!important;font-size:14px;}
        .ht-score{text-align:center;color:#f5c842;font-weight:900;font-size:20px;line-height:1;letter-spacing:0.5px;}
        .ht-date{color:#f5c842;font-size:9px;font-weight:700;margin-top:4px;line-height:1.1;}
        .ht-chev{color:rgba(225,173,1,.5);font-size:11px;margin-left:3px;cursor:pointer;transition:.25s;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;}
        .ht-match.ht-open .ht-chev{transform:rotate(180deg);color:#f5c842;}
        .ht-pred{display:none;padding:8px 8px 10px;background:#001A5C;grid-template-columns:repeat(4,1fr);gap:5px;}
        .ht-match.ht-open .ht-pred{display:grid;}
        .ht-pred-item{min-height:60px;border:1px solid rgba(225,173,1,.3);border-radius:6px;background:#001A5C;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:4px 3px;}
        .ht-pred-label{font-size:7px;color:#bda247;text-transform:uppercase;font-weight:900;letter-spacing:.5px;margin-bottom:3px;}
        .ht-pred-value{font-size:10px;color:#00ff6a;font-weight:900;line-height:1.1;text-transform:uppercase;}
        .ht-pred-value.red{color:#ff4040;}
        .ht-pred-value.gold{color:#f5c842;}
        .ht-pred-small{font-size:7px;color:rgba(255,255,255,.4);margin-top:3px;line-height:1.1;}
        @media(max-width:480px){
            .ht-row{grid-template-columns:1fr 60px 1fr;padding:4px 5px;gap:4px;min-height:48px;}
            .ht-team{font-size:9px;gap:3px;}
            .ht-name{font-size:8px;}
            .ht-logo,.ht-ball{width:18px;height:18px;flex-basis:18px;}
            .ht-score{font-size:16px;}
            .ht-date{font-size:7px;}
            .ht-league-head{font-size:9px;padding:4px 16px;}
            .ht-pred{grid-template-columns:repeat(2,1fr);gap:4px;}
            .ht-pred-item{min-height:48px;padding:3px;}
            .ht-pred-value{font-size:8px;}
            .ht-title-text{font-size:12px;}
            .ht-main-title{padding:5px;}
        }
        @keyframes htRay{0%{left:-150%}50%{left:150%}100%{left:150%}}
        @keyframes htSeaSparkle{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
        .ht-league:before{content:"";position:absolute;top:0;width:30%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);transform:skewX(-25deg);animation:htRay 5s infinite linear;pointer-events:none;z-index:0;}
    </style>
</head>

<div class="container" id="appContainer">

    <!-- HEADER -->
    <div class="header">
        <h1>✨ LATOTO PREDIKSI ✨</h1>
        <p>GENERATOR BISA KARENA TERBIASA</p>
    </div>

    <!-- PANEL INPUT -->
    <div class="panel">
        <div class="input-section">
            <label for="matchInput">📝 INPUT JADWAL LAGA:</label>
            <textarea id="matchInput" placeholder="Tempelkan data pasaran di sini..."></textarea>
            <div class="buttons">
                <button class="btn btn-generate" onclick="generateTables()">🚀 GENERATE</button>
                <button class="btn btn-copy" onclick="copyHTML()">📋 COPY</button>
            </div>
        </div>

        <!-- SETTINGS -->
        <div class="settings-panel">
            <div class="settings-title">🎨 Pengaturan</div>
            <div class="settings-grid">
                <div class="setting-group">
                    <label>Border</label>
                    <div class="color-picker-wrapper">
                        <div class="color-block-preview" id="borderColorPreview" style="background:#c49e1f;"></div>
                        <input type="color" id="borderColor" value="#c49e1f" onchange="updateBorderColor(this.value)">
                    </div>
                </div>
                <div class="setting-group">
                    <label>Header</label>
                    <div class="color-picker-wrapper">
                        <div class="color-block-preview" id="headerColorPreview" style="background:#c49e1f;"></div>
                        <input type="color" id="headerColor" value="#c49e1f" onchange="updateHeaderColor(this.value)">
                    </div>
                </div>
                <div class="setting-group">
                    <label>Skor</label>
                    <div class="color-picker-wrapper">
                        <div class="color-block-preview" id="scoreColorPreview" style="background:#f5c842;"></div>
                        <input type="color" id="scoreColor" value="#f5c842" onchange="updateScoreColor(this.value)">
                    </div>
                </div>
                <div class="setting-group">
                    <label>Font Size</label>
                    <input type="range" id="fontSize" min="10" max="16" value="12" step="1" oninput="updateFontSize(this.value)">
                    <div class="range-info"><span>10px</span><span class="range-value" id="fontSizeValue">12px</span><span>16px</span></div>
                </div>
                <div class="setting-group">
                    <label>Font</label>
                    <select id="fontFamilySelect" class="font-dropdown" onchange="updateFontFamily(this.value)">
                        <option value="'Segoe UI', sans-serif">Segoe UI</option>
                        <option value="Arial, sans-serif">Arial</option>
                        <option value="'Impact', sans-serif">Impact</option>
                        <option value="'Courier New', monospace">Courier</option>
                        <option value="Georgia, serif">Georgia</option>
                    </select>
                </div>
            </div>
            <div class="font-quick-grid">
                <div class="font-mini-card" onclick="quickSelectFont('Arial, sans-serif')">Arial</div>
                <div class="font-mini-card" onclick="quickSelectFont('Georgia, serif')">Georgia</div>
                <div class="font-mini-card" onclick="quickSelectFont('Courier New, monospace')">Courier</div>
                <div class="font-mini-card active" onclick="quickSelectFont('Segoe UI, sans-serif')">Segoe</div>
                <div class="font-mini-card" onclick="quickSelectFont('Impact, sans-serif')">Impact</div>
            </div>
            <div class="preset-container">
                <button class="preset-pill" onclick="applyPreset('emas')">✨ Emas</button>
                <button class="preset-pill" onclick="applyPreset('hijau')">🌿 Hijau</button>
                <button class="preset-pill" onclick="applyPreset('cyan')">💎 Cyan</button>
            </div>
        </div>

        <!-- PREVIEW -->
        <div class="preview-label">📊 Live Preview</div>
        <div id="tablesContainer"></div>

        <div class="preview-label" style="margin-top:10px;">📝 Output HTML Blog</div>
        <div class="preview-area"><pre id="previewOutput">Klik "GENERATE" untuk merender data...</pre></div>
    </div>

    <div class="footer">LATOTO MANAGEMENT • PREDIKSI BOLA</div>
</div>

<div class="notification" id="notification">✓ BERHASIL!</div>

function getClubLogo(name){
    const raw=String(name||'').trim().replace(/\[\d+\]\s*/g,'');
    for(const [k,v] of Object.entries(CLUB_LOGO_DB)){
        if(raw.toLowerCase()===k.toLowerCase() || k.toLowerCase().includes(raw.toLowerCase()) || raw.toLowerCase().includes(k.toLowerCase())) return v;
    }
    return '';
}

function parseInput(t){
    const lines=t.split('\n'),leagues=[];let cur=null;
    for(const line of lines){
        const l=line.trim();if(!l)continue;
        if(!/\bVS\b/i.test(l)){if(cur&&cur.matches.length)leagues.push(cur);cur={name:l,matches:[]};}
        else if(cur){
            const m=l.match(/(\d{2}\/\d{2})\s+(\d{2}[.:]\d{2})\s+(\w+)\s+(.+?)\s+VS\s+(.+?)\s+(\d+(?:\s+\d+)?(?:\/\d+)?)\s*:\s*(\d+(?:\s+\d+)?(?:\/\d+)?)/i);
            if(m){cur.matches.push({date:m[1],time:m[2].replace(/\./,':'),timezone:m[3],team1:m[4].trim().replace(/\[\d+\]\s*/,''),team2:m[5].trim().replace(/\[\d+\]\s*/,''),scoreDisplay:m[6]+' : '+m[7]});}
        }
    }
    if(cur&&cur.matches.length)leagues.push(cur);
    return leagues;
}
function logoTag(name){const u=getClubLogo(name);if(!u)return '<span class="ht-ball">⚽</span>';return '<img class="ht-logo" src="'+u+'" alt="'+name.replace(/"/g,'&quot;')+'" onerror="this.outerHTML=\'<span class=&quot;ht-ball&quot;>⚽</span>\'">';}
function teamHTML(name,side){const logo=logoTag(name),nm='<span class="ht-name">'+name+'</span>';if(side==='right')return '<div class="ht-team right" role="button" tabindex="0">'+nm+logo+'<span class="ht-chev">⌄</span></div>';return '<div class="ht-team">'+logo+nm+'</div>';}
function predData(m){
    const sc=(m.scoreDisplay.match(/\d+/g)||['0','0']).map(Number), total=sc[0]+sc[1];
    const win=sc[0]>sc[1]?'HOME WIN':sc[1]>sc[0]?'AWAY WIN':'DRAW', pick=sc[0]>=sc[1]?m.team1:m.team2;
    const hc=sc[0]===sc[1]?(m.team1+' +0.5'):(pick+' -0.5');
    const ou=(total>=4?'OVER ':'UNDER ')+(total>=4?'3.5':'3.5');
    return {handicap:hc,ou,winner:win,score:m.scoreDisplay.replace(/\s*/g,'').replace(':',' - '),pick};
}
function predPanel(m){
    const p=predData(m);

}

function updateScoreColor(c){settings.scoreColor=c;document.getElementById('scoreColorPreview').style.background=c;if(document.getElementById('matchInput').value)generateTables();}
function updateFontSize(s){settings.fontSize=s;document.getElementById('fontSizeValue').textContent=s+'px';if(document.getElementById('matchInput').value)generateTables();}
function updateFontFamily(f){settings.fontFamily=f;if(document.getElementById('matchInput').value)generateTables();}
function quickSelectFont(f){settings.fontFamily=f;document.getElementById('fontFamilySelect').value=f;document.querySelectorAll('.font-mini-card').forEach(c=>c.classList.toggle('active',f.includes(c.textContent)));if(document.getElementById('matchInput').value)generateTables();showNotification('Font: '+f.split(',')[0]);}
function applyPreset(t){const p={emas:{border:'#c49e1f',header:'#c49e1f',score:'#f5c842'},hijau:{border:'#00ff6a',header:'#00cc55',score:'#00ff6a'},cyan:{border:'#00eaff',header:'#00ccdd',score:'#00eaff'}};const pr=p[t];if(pr){settings.borderColor=pr.border;settings.headerColor=pr.header;settings.scoreColor=pr.score;document.getElementById('borderColor').value=pr.border;document.getElementById('headerColor').value=pr.header;document.getElementById('scoreColor').value=pr.score;document.getElementById('borderColorPreview').style.background=pr.border;document.getElementById('headerColorPreview').style.background=pr.header;document.getElementById('scoreColorPreview').style.background=pr.score;if(document.getElementById('matchInput').value)generateTables();showNotification('✓ Preset '+t.toUpperCase());}}
// ===== INIT =====
window.addEventListener('DOMContentLoaded',function(){

25/06 09.00 WIB Mexico VS Czech Republic 2 : 2`;
    generateTables();
});
// Event click untuk toggle prediksi
document.addEventListener('click',function(e){
    const b=e.target.closest&&e.target.closest('.ht-team.right,.ht-chev');
    if(b){const c=b.closest('.ht-match');if(c)c.classList.toggle('ht-open');}
});
</script>
