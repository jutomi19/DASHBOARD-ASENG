<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RRN Qiris · LATOTO</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ═══ THEME GOLD NEON ═══ */
    :root {
      --bg: #080c18;
      --bg-card: rgba(14,21,40,0.75);
      --bg-card-hover: rgba(20,30,55,0.85);
      --border: rgba(255,215,0,0.08);
      --border-hover: rgba(245,200,66,0.25);
      --gold: #f5c842;
      --gold-bg: rgba(245,200,66,0.08);
      --gold-glow: rgba(245,200,66,0.15);
      --coral: #f87171;
      --coral-bg: rgba(248,113,113,0.08);
      --text: #f0ead8;
      --text-2: #8899b0;
      --text-3: #4a5a72;
      --r: 14px;
      --r-sm: 10px;
      --ease: all 0.35s cubic-bezier(.4,0,.2,1);
    }
    [data-theme="light"] {
      --bg: #f0ece4;
      --bg-card: rgba(255,255,255,0.75);
      --bg-card-hover: rgba(255,255,255,0.9);
      --border: rgba(160,130,20,0.12);
      --border-hover: rgba(245,200,66,0.3);
      --gold: #b8860b;
      --gold-bg: rgba(184,134,11,0.06);
      --text: #1a1a2e;
      --text-2: #4a5568;
      --text-3: #8896aa;
    }
    [data-theme="cyan"] {
      --bg: #061218;
      --bg-card: rgba(8,28,38,0.75);
      --bg-card-hover: rgba(12,36,48,0.85);
      --border: rgba(0,212,180,0.12);
      --border-hover: rgba(0,212,180,0.3);
      --gold: #00d4b4;
      --gold-bg: rgba(0,212,180,0.08);
      --text: #d6f3f0;
      --text-2: #8bc9c0;
      --text-3: #4a8a7e;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    body {
      background: var(--bg);
      font-family: 'Outfit', sans-serif;
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      transition: background 0.3s, color 0.3s;
    }
    .panel { max-width:1200px; margin:0 auto; padding:28px; }
    .panel-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:14px; }
    .panel-head-left { display:flex; align-items:center; gap:14px; }
    .panel-icon {
      width:40px; height:40px; border-radius:var(--r-sm);
      background:var(--gold-bg); border:1px solid rgba(245,200,66,0.12);
      display:flex; align-items:center; justify-content:center;
      color:var(--gold); font-size:0.95rem; flex-shrink:0;
      transition: var(--ease);
    }
    .panel-title {
      font-family:'Bebas Neue',sans-serif; font-size:1.35rem;
      letter-spacing:2px; color:var(--text); line-height:1.1;
    }
    .panel-subtitle { font-size:0.7rem; color:var(--text-3); letter-spacing:0.3px; margin-top:2px; }
    .panel-badges { display:flex; gap:8px; flex-wrap:wrap; }
    .p-badge {
      padding:6px 14px; border-radius:100px; font-size:0.68rem; font-weight:600;
      letter-spacing:0.5px; border:1px solid var(--border);
      background:rgba(255,255,255,0.02); color:var(--text-2);
      display:flex; align-items:center; gap:6px;
      transition: var(--ease);
    }
    .p-badge i { font-size:0.65rem; }
    .p-badge.b-gold i { color:var(--gold); }
    .p-badge.b-coral i { color:var(--coral); }

    .toolbar { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .search { flex:1; min-width:200px; position:relative; }
    .search i { position:absolute; left:14px; top:50%; transform:translateY(-50%); color:var(--text-3); font-size:0.78rem; }
    .search input {
      width:100%; padding:10px 14px 10px 40px;
      background:rgba(255,255,255,0.03); border:1px solid var(--border);
      border-radius:100px; color:var(--text); font-family:'Outfit',sans-serif;
      font-size:0.8rem; outline:none; transition:var(--ease);
    }
    .search input::placeholder { color:var(--text-3); }
    .search input:focus { border-color:var(--border-hover); background:rgba(255,255,255,0.05); box-shadow:0 0 0 3px rgba(245,200,66,0.05); }
    .search input:focus + i { color:var(--gold); }

    .chips { display:flex; gap:6px; flex-wrap:wrap; }
    .chip {
      padding:9px 14px; border-radius:100px; font-size:0.68rem; font-weight:600;
      cursor:pointer; border:1px solid var(--border); background:transparent;
      color:var(--text-3); transition:var(--ease); font-family:'Outfit',sans-serif; white-space:nowrap;
    }
    .chip:hover { border-color:rgba(255,255,255,0.1); color:var(--text-2); }
    .chip.on { background:var(--gold-bg); border-color:rgba(245,200,66,0.2); color:var(--gold); }

    .view-tog {
      display:flex; background:rgba(255,255,255,0.02);
      border:1px solid var(--border); border-radius:100px; padding:3px; margin-left:auto;
    }
    .v-btn { padding:8px 12px; border:none; background:transparent; color:var(--text-3); border-radius:100px; cursor:pointer; font-size:0.72rem; transition:var(--ease); }
    .v-btn.on { background:rgba(255,255,255,0.07); color:var(--text); }
    .v-btn:hover:not(.on) { color:var(--text-2); }

    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:14px; }
    .grid.list { grid-template-columns:1fr; gap:8px; }

    .card {
      background:var(--bg-card); backdrop-filter:blur(12px);
      border:1px solid var(--border); border-radius:var(--r);
      overflow:hidden; cursor:pointer; transition:var(--ease);
      position:relative; opacity:0; transform:translateY(16px);
    }
    .card.show { animation:cardIn 0.4s ease forwards; }
    @keyframes cardIn { to{opacity:1;transform:translateY(0);} }
    .card:hover {
      border-color:var(--border-hover); transform:translateY(-4px);
      box-shadow:0 12px 32px rgba(0,0,0,0.35),0 0 20px rgba(245,200,66,0.05);
      background:var(--bg-card-hover);
    }
    .card-img-wrap { position:relative; overflow:hidden; background:rgba(0,0,0,0.25); }
    .card-img { width:100%; height:130px; object-fit:cover; display:block; transition:transform 0.5s ease,filter 0.3s; filter:brightness(0.88) saturate(0.9); }
    .card:hover .card-img { transform:scale(1.06); filter:brightness(1) saturate(1); }
    .card-img-grad { position:absolute; inset:0; background:linear-gradient(180deg,transparent 30%,rgba(8,12,24,0.6) 100%); }
    .card-no {
      position:absolute; top:8px; left:8px; z-index:2;
      width:26px; height:26px; border-radius:8px;
      background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      font-family:'JetBrains Mono',monospace; font-size:0.6rem;
      font-weight:600; color:var(--text-2);
    }
    .card-tag {
      position:absolute; top:8px; right:8px; z-index:2;
      padding:3px 9px; border-radius:100px; font-size:0.55rem;
      font-weight:700; letter-spacing:0.6px; text-transform:uppercase;
      backdrop-filter:blur(8px);
    }
    .tag-bank { background:rgba(245,200,66,0.12); color:var(--gold); border:1px solid rgba(245,200,66,0.15); }
    .tag-ewallet { background:rgba(245,200,66,0.12); color:var(--gold); border:1px solid rgba(245,200,66,0.15); }
    .tag-other { background:rgba(245,200,66,0.12); color:var(--gold); border:1px solid rgba(245,200,66,0.15); }

    .card-copy {
      position:absolute; bottom:8px; right:8px; z-index:2;
      width:30px; height:30px; border-radius:50%;
      background:rgba(0,0,0,0.45); backdrop-filter:blur(8px);
      border:1px solid rgba(255,255,255,0.08);
      display:flex; align-items:center; justify-content:center;
      color:var(--text-2); font-size:0.65rem;
      opacity:0; transform:scale(0.7); transition:var(--ease);
    }
    .card:hover .card-copy { opacity:1; transform:scale(1); }
    .card-copy:hover { background:var(--gold); color:var(--bg); border-color:var(--gold); }

    .card-body { padding:12px 14px 14px; }
    .card-name { font-size:0.72rem; font-weight:600; color:var(--text); margin-bottom:8px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.45; }
    .card:hover .card-name { color:#fff; }
    .card-foot { display:flex; align-items:center; justify-content:space-between; }
    .card-foot span { font-size:0.62rem; color:var(--text-3); display:flex; align-items:center; gap:5px; }
    .card-foot span i { font-size:0.55rem; }
    .card-go { width:24px; height:24px; border-radius:50%; background:rgba(255,255,255,0.03); display:flex; align-items:center; justify-content:center; font-size:0.6rem; color:var(--text-3); transition:var(--ease); }
    .card:hover .card-go { background:var(--gold-bg); color:var(--gold); transform:translateX(2px); }

    .grid.list .card { display:flex; align-items:stretch; }
    .grid.list .card-img-wrap { width:140px; min-width:140px; }
    .grid.list .card-img { height:100%; min-height:90px; }
    .grid.list .card-copy { display:none; }
    .grid.list .card-body { display:flex; flex-direction:column; justify-content:center; flex:1; }

    .empty { grid-column:1/-1; text-align:center; padding:56px 20px; display:none; }
    .empty.on { display:block; }
    .empty i { font-size:2rem; color:var(--text-3); opacity:0.4; margin-bottom:14px; }
    .empty p { font-size:0.8rem; color:var(--text-3); }
    .empty p strong { color:var(--text-2); font-weight:600; }

    .modal-bg {
      position:fixed; inset:0; background:rgba(4,8,16,0.92);
      backdrop-filter:blur(30px); display:flex; align-items:center;
      justify-content:center; z-index:1000; padding:20px;
      opacity:0; visibility:hidden; transition:var(--ease);
    }
    .modal-bg.on { opacity:1; visibility:visible; }
    .modal-box {
      background:linear-gradient(165deg,rgba(15,25,48,0.97),rgba(10,16,30,0.99));
      border:1px solid var(--border); border-radius:20px;
      width:100%; max-width:560px; max-height:88vh; overflow:hidden;
      transform:scale(0.93) translateY(30px);
      transition:transform 0.4s cubic-bezier(.34,1.56,.64,1);
      box-shadow:0 40px 80px rgba(0,0,0,0.5); position:relative;
    }
    .modal-box::before {
      content:''; position:absolute; top:0; left:0; right:0; height:1px;
      background:linear-gradient(90deg,transparent,var(--gold),transparent);
      opacity:0.4;
    }
    .modal-bg.on .modal-box { transform:scale(1) translateY(0); }
    .modal-top {
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 22px; border-bottom:1px solid var(--border);
    }
    .modal-top h3 {
      font-family:'Bebas Neue',sans-serif; font-size:1.05rem;
      letter-spacing:1.5px; color:var(--text); white-space:nowrap;
      overflow:hidden; text-overflow:ellipsis; padding-right:14px; line-height:1.3;
    }
    .modal-top h3 span {
      display:block; font-family:'Outfit',sans-serif; font-size:0.62rem;
      font-weight:500; color:var(--text-3); letter-spacing:0; margin-top:2px;
    }
    .modal-x {
      width:36px; height:36px; border-radius:var(--r-sm);
      border:1px solid var(--border); background:transparent;
      color:var(--text-3); font-size:0.9rem; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      transition:var(--ease); flex-shrink:0;
    }
    .modal-x:hover { background:var(--coral-bg); border-color:rgba(248,113,113,0.2); color:var(--coral); transform:rotate(90deg); }
    .modal-inner { padding:20px 22px 22px; overflow-y:auto; max-height:calc(88vh - 72px); }
    .modal-pic-frame { position:relative; background:rgba(0,0,0,0.3); border-radius:var(--r); padding:8px; margin-bottom:18px; }
    .modal-pic-frame::before {
      content:''; position:absolute; inset:0; border-radius:var(--r); padding:1px;
      background:linear-gradient(135deg,rgba(245,200,66,0.15),transparent 50%,rgba(245,200,66,0.1));
      -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
      -webkit-mask-composite:xor; mask-composite:exclude; pointer-events:none;
    }
    .modal-pic { width:100%; max-height:46vh; object-fit:contain; border-radius:11px; display:block; transition:transform 0.3s; }
    .modal-pic-frame:hover .modal-pic { transform:scale(1.02); }
    .modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .m-btn {
      padding:13px 18px; border-radius:var(--r-sm);
      font-family:'Outfit',sans-serif; font-weight:600; font-size:0.8rem;
      cursor:pointer; display:flex; align-items:center;
      justify-content:center; gap:9px; transition:var(--ease);
      position:relative; overflow:hidden;
    }
    .m-btn::after {
      content:''; position:absolute; inset:0;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
      transform:translateX(-100%); transition:transform 0.5s;
    }
    .m-btn:hover::after { transform:translateX(100%); }
    .m-btn-sec { background:rgba(255,255,255,0.03); border:1px solid var(--border); color:var(--text-2); }
    .m-btn-sec:hover { border-color:var(--border-hover); color:var(--gold); background:var(--gold-bg); transform:translateY(-2px); }
    .m-btn-pri { background:linear-gradient(135deg,var(--gold),#b8860b); border:none; color:#000; box-shadow:0 4px 18px rgba(245,200,66,0.25); }
    .m-btn-pri:hover { transform:translateY(-2px); box-shadow:0 8px 28px rgba(245,200,66,0.35); }

    .spin { width:14px; height:14px; border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; animation:sp 0.6s linear infinite; display:none; }
    @keyframes sp { to{transform:rotate(360deg);} }

    .toast {
      position:fixed; bottom:24px; right:24px; z-index:1100;
      display:flex; align-items:center; gap:12px; padding:14px 20px;
      background:rgba(12,20,38,0.95); backdrop-filter:blur(16px);
      border:1px solid rgba(245,200,66,0.15); border-radius:var(--r);
      box-shadow:0 16px 40px rgba(0,0,0,0.35);
      transform:translateX(calc(100% + 30px)); opacity:0;
      transition:all 0.45s cubic-bezier(.34,1.56,.64,1);
    }
    .toast.on { transform:translateX(0); opacity:1; }
    .toast-ic { width:32px; height:32px; border-radius:9px; background:rgba(245,200,66,0.1); display:flex; align-items:center; justify-content:center; color:var(--gold); font-size:0.8rem; flex-shrink:0; }
    .toast-msg { font-weight:600; font-size:0.8rem; color:var(--text); }
    .toast-msg small { display:block; font-weight:400; font-size:0.65rem; color:var(--text-3); margin-top:1px; }

    ::-webkit-scrollbar { width:5px; height:5px; }
    ::-webkit-scrollbar-track { background:transparent; }
    ::-webkit-scrollbar-thumb { background:rgba(255,215,0,0.1); border-radius:10px; }
    ::-webkit-scrollbar-thumb:hover { background:rgba(255,215,0,0.3); }

    @media(max-width:640px){
      .panel{padding:18px;}
      .panel-head{flex-direction:column;align-items:flex-start;}
      .panel-badges{width:100%;}
      .toolbar{flex-direction:column;align-items:stretch;}
      .chips{overflow-x:auto;flex-wrap:nowrap;padding-bottom:2px;}
      .view-tog{margin-left:0;align-self:flex-end;}
      .grid{grid-template-columns:repeat(2,1fr);gap:10px;}
      .card-img{height:105px;}
      .card-body{padding:10px 12px 12px;}
      .card-name{font-size:0.65rem;-webkit-line-clamp:1;}
      .card-foot span{display:none;}
      .modal-btns{grid-template-columns:1fr;}
      .grid.list{grid-template-columns:1fr;}
      .grid.list .card-img-wrap{width:100px;min-width:100px;}
      .toast{left:16px;right:16px;bottom:16px;}
    }
    @media(max-width:380px){ .grid{grid-template-columns:1fr;} .card-img{height:140px;} }
    @media(prefers-reduced-motion:reduce){ *,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;} }
  </style>
</head>
<body>

<div class="panel">
  <div class="panel-head">
    <div class="panel-head-left">
      <div class="panel-icon"><i class="fas fa-receipt"></i></div>
      <div>
        <div class="panel-title">BUKTI TRANSFER RRN</div>
        <div class="panel-subtitle">Klik kartu untuk preview &amp; salin gambar</div>
      </div>
    </div>
    <div class="panel-badges">
      <div class="p-badge b-gold"><i class="fas fa-layer-group"></i> <span id="countBadge">30</span> Bukti</div>
      <div class="p-badge b-gold"><i class="fas fa-university"></i> <span id="bankCount">21</span> Bank</div>
      <div class="p-badge b-gold"><i class="fas fa-wallet"></i> <span id="ewCount">6</span> E-Wallet</div>
      <div class="p-badge b-gold"><i class="fas fa-ellipsis"></i> <span id="otCount">3</span> Lainnya</div>
      <div class="p-badge b-coral"><i class="fas fa-clock"></i> <span id="clock">--:--</span></div>
    </div>
  </div>

  <div class="toolbar">
    <div class="search">
      <input type="text" id="searchIn" placeholder="Cari nama bank / e-wallet...">
      <i class="fas fa-search"></i>
    </div>
    <div class="chips" id="chips">
      <button class="chip on" data-f="all">Semua</button>
      <button class="chip" data-f="bank"><i class="fas fa-university" style="margin-right:4px;font-size:0.6rem"></i> Bank</button>
      <button class="chip" data-f="ewallet"><i class="fas fa-wallet" style="margin-right:4px;font-size:0.6rem"></i> E-Wallet</button>
      <button class="chip" data-f="other"><i class="fas fa-ellipsis" style="margin-right:4px;font-size:0.6rem"></i> Lainnya</button>
    </div>
    <div class="view-tog">
      <button class="v-btn on" data-v="grid"><i class="fas fa-grid-2"></i></button>
      <button class="v-btn" data-v="list"><i class="fas fa-list"></i></button>
    </div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<!-- Modal -->
<div class="modal-bg" id="mBg">

    <div class="modal-top">
      <h3 id="mTitle">Title<span id="mType">Bank</span></h3>
      <button class="modal-x" id="mClose"><i class="fas fa-xmark"></i></button>
    </div>
    <div class="modal-inner">
      <div class="modal-pic-frame">
        <img class="modal-pic" id="mImg" src="" alt="Preview" crossorigin="anonymous">
      </div>
      <div class="modal-btns">
        <button class="m-btn m-btn-sec" id="btnTab"><i class="fas fa-arrow-up-right-from-square"></i> Buka Tab</button>
        <button class="m-btn m-btn-pri" id="btnCopy"><i class="fas fa-copy"></i> Salin<span class="spin" id="spin"></span></button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <div class="toast-ic"><i class="fas fa-check"></i></div>
  <div class="toast-msg"><span id="tMsg">OK</span><small id="tSub"></small></div>
</div>

    {c:"BUKTI RRN Bank BRI",u:"https://i.ibb.co/gZd9Ds4b/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank BSI",u:"https://i.ibb.co/X9qcDKh/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank BSI BYOND",u:"https://i.ibb.co/HDd0SHbs/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank Non BSI BYOND App",u:"https://i.ibb.co/VYCk3T3b/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank BTN",u:"https://i.ibb.co/zhfNsbdB/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank CIMB",u:"https://i.ibb.co/V0wQbyH4/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank Danamon",u:"https://i.ibb.co/sd1Cn3fz/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank I.Saku",u:"https://i.ibb.co/1tZJYS0t/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Mandiri / Livin",u:"https://i.ibb.co/Z3NzF8F/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN MyBCA",u:"https://i.ibb.co/ZyBpFr8/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN OCBC",u:"https://i.ibb.co/BVL3zGxB/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN SeaBank",u:"https://i.ibb.co/CKmsJxXw/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN Bank Sinarmas",u:"https://i.ibb.co/JjB8PYkC/image.png",cat:"bank",label:"Bank"},
    {c:"BUKTI RRN DANA",u:"https://i.ibb.co/1GFYZx68/image.png",cat:"ewallet",label:"E-Wallet"},
    {c:"BUKTI RRN OVO",u:"https://i.ibb.co/JwtFnkMt/image.png",cat:"ewallet",label:"E-Wallet"},
    {c:"BUKTI RRN LinkAja",u:"https://i.ibb.co/8LRB6VPL/image.png",cat:"ewallet",label:"E-Wallet"},
    {c:"BUKTI RRN GOPAY",u:"https://i.ibb.co/MkG4PmtL/image.png",cat:"ewallet",label:"E-Wallet"}
  ];

  const bankN = D.filter(d=>d.cat==='bank').length;
  const ewN = D.filter(d=>d.cat==='ewallet').length;
  const otN = D.filter(d=>d.cat==='other').length;
  document.getElementById('bankCount').textContent=bankN;
  document.getElementById('ewCount').textContent=ewN;
  document.getElementById('otCount').textContent=otN;

  let filter='all', q='', view='grid', mUrl='';
  const $=id=>document.getElementById(id);
  const grid=$('grid'), countEl=$('countBadge');

  function filtered(){
    return D.filter(d=>(filter==='all'||d.cat===filter)&&d.c.toLowerCase().includes(q.toLowerCase()));
  }

  function tagClass(cat){ return cat==='bank'?'tag-bank':cat==='ewallet'?'tag-ewallet':'tag-other'; }
  function tagText(cat){ return cat==='bank'?'BANK':cat==='ewallet'?'E-WALLET':'LAINNYA'; }

  function render(){
    const list=filtered();
    countEl.textContent=list.length;
    if(!list.length){
      grid.innerHTML='<div class="empty on"><i class="fas fa-search"></i><p>Tidak ditemukan. Coba <strong>ubah kata kunci</strong> atau filter.</p></div>';
      return;
    }
    grid.innerHTML=list.map((d,i)=>`
      <div class="card" data-u="${d.u}" data-c="${d.c}" data-cat="${d.cat}" data-label="${d.label}" style="animation-delay:${i*0.04}s">
        <div class="card-img-wrap">
          <img class="card-img" src="${d.u}" alt="${d.c}" loading="lazy" crossorigin="anonymous">
          <div class="card-img-grad"></div>
          <div class="card-no">${String(i+1).padStart(2,'0')}</div>
          <span class="card-tag ${tagClass(d.cat)}">${tagText(d.cat)}</span>
          <button class="card-copy" onclick="event.stopPropagation();qCopy('${d.u}')" title="Quick Copy"><i class="fas fa-copy"></i></button>
        </div>
        <div class="card-body">
          <div class="card-name">${d.c}</div>
          <div class="card-foot">
            <span><i class="fas fa-receipt"></i>${d.label}</span>
            <div class="card-go"><i class="fas fa-arrow-right"></i></div>
          </div>
        </div>
      </div>`).join('');

    requestAnimationFrame(()=>{
      grid.querySelectorAll('.card').forEach((c,i)=>setTimeout(()=>c.classList.add('show'),i*40));
    });

    grid.querySelectorAll('.card').forEach(c=>{
      c.addEventListener('click',()=>openM(c.dataset.c,c.dataset.u,c.dataset.cat,c.dataset.label));
    });
  }

  $('searchIn').addEventListener('input',e=>{q=e.target.value;render();});
  $('chips').addEventListener('click',e=>{
    const ch=e.target.closest('.chip');if(!ch)return;
    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('on'));
    ch.classList.add('on');filter=ch.dataset.f;render();
  });
  document.querySelector('.view-tog').addEventListener('click',e=>{
    const b=e.target.closest('.v-btn');if(!b)return;
    document.querySelectorAll('.v-btn').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');view=b.dataset.v;
    grid.classList.toggle('list',view==='list');
  });

  window.qCopy=async function(u){
    try{
      const r=await fetch(u,{mode:'cors',cache:'no-cache'});
      const bl=await r.blob();
      await navigator.clipboard.write([new ClipboardItem({[bl.type]:bl})]);
      toast('Berhasil disalin!','Gambar di clipboard');
    }catch{
      try{await navigator.clipboard.writeText(u);toast('Link disalin','URL di clipboard');}
      catch{toast('Gagal','Coba klik kartu dulu');}
    }
  };

  function openM(c,u,cat,label){
    mUrl=u;
    $('mTitle').childNodes[0].textContent=c;
    $('mType').textContent=label;
    $('mImg').src=u;
    $('mBg').classList.add('on');
    document.body.style.overflow='hidden';
  }
  function closeM(){$('mBg').classList.remove('on');document.body.style.overflow='';}
  $('mClose').addEventListener('click',closeM);
  $('mBg').addEventListener('click',e=>{if(e.target===$('mBg'))closeM();});
  document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});

  $('btnTab').addEventListener('click',()=>{if(mUrl)window.open(mUrl,'_blank');});
  $('btnCopy').addEventListener('click',async function(){
    const sp=$('spin');sp.style.display='inline-block';
    try{
      const r=await fetch(mUrl,{mode:'cors',cache:'no-cache'});
      const bl=await r.blob();
      await navigator.clipboard.write([new ClipboardItem({[bl.type]:bl})]);
      toast('Berhasil disalin!','Gambar di clipboard');
    }catch{
      try{await navigator.clipboard.writeText(mUrl);toast('Link disalin','URL di clipboard');}
      catch{toast('Gagal','Coba buka di tab baru');}
    }
    sp.style.display='none';
  });

  function toast(m,s){
    $('tMsg').textContent=m;$('tSub').textContent=s||'';
    const t=$('toast');t.classList.add('on');
    clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('on'),2800);
  }

  function tick(){
    const n=new Date();
    $('clock').textContent=String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  }
  tick();setInterval(tick,10000);

  render();

  // Theme sync
  (function syncTheme() {
    const valid=['dark','light','cyan'];
    const saved=localStorage.getItem('cs-theme');
    if(saved && valid.includes(saved)) document.documentElement.setAttribute('data-theme', saved);
    else document.documentElement.setAttribute('data-theme','dark');
    window.addEventListener('storage', e=>{
      if(e.key==='cs-theme' && valid.includes(e.newValue)) document.documentElement.setAttribute('data-theme', e.newValue);
    });
    window.addEventListener('message', e=>{
      if(e.data?.type==='themeChange' && valid.includes(e.data.theme)) document.documentElement.setAttribute('data-theme', e.data.theme);
    });
  })();
})();
</script>
</body>
</html>
